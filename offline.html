<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Sin Conexión - Midnight Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="robots" content="noindex, nofollow" />
  
  <style>
    :root {
      --mc-red: #ff2d2d;
      --bg: #050505;
      --text: #f7f4ee;
      --muted: #9b968d;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    
    .logo {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 40px;
      color: var(--mc-red);
      text-shadow: 0 0 30px rgba(255, 45, 45, 0.3);
    }
    
    .icon {
      font-size: 48px;
      margin-bottom: 24px;
      opacity: 0.6;
    }
    
    h1 {
      font-size: 18px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    
    p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 40px;
      max-width: 280px;
      line-height: 1.6;
    }
    
    .btn-retry {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 16px 40px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .btn-retry:active {
      transform: scale(0.98);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  
  <div class="logo">MIDNIGHT CLUB</div>
  
  <div class="icon">📡</div>
  
  <h1>SIN CONEXIÓN</h1>
  
  <p>No hay conexión a internet. Volvé cuando tengas señal para acceder a todos los beneficios.</p>
  
  <button class="btn-retry" onclick="location.reload()">REINTENTAR</button>

</body>
</html>
