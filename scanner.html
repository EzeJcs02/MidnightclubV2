<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Scanner Panel - Midnight Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>

<body class="mc-body" style="background-color: #050505; color: #fff; font-family: 'Inter', sans-serif;">
  <header style="padding: 20px; text-align: center; border-bottom: 1px solid #222;">
    <h1 style="font-size: 1.2rem; letter-spacing: 2px;">MC // SCANNER</h1>
  </header>

  <main style="padding: 20px; max-width: 500px; margin: 0 auto;">
    
    <!-- PIN Auth Section -->
    <div id="authSection" style="display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 50px;">
      <h2 id="pinInputLabel" style="font-size: 1rem; color: #888;">INGRESE PIN DE SEGURIDAD</h2>
      <input type="password" id="pinInput" class="pass-input" style="text-align: center; font-size: 1.5rem;" placeholder="****" aria-labelledby="pinInputLabel">
      <button id="btnEnter" class="mc-gate-btn" style="width: 100%;">ENTRAR</button>
    </div>

    <!-- Scanner Section -->
    <div id="scannerSection" style="display: none; flex-direction: column; gap: 20px; align-items: center;">
      <div id="reader" style="width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #333;"></div>
      
      <div style="width: 100%; text-align: center;">
        <h3 id="manualCodeLabel" style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">INGRESO MANUAL</h3>
        <input type="text" id="manualCode" class="pass-input" placeholder="MC-TICKET-..." style="text-align: center;" aria-labelledby="manualCodeLabel">
        <button id="btnManual" class="mc-gate-btn" style="width: 100%; margin-top: 10px; background: transparent; border: 1px solid #fff; color: #fff;">VERIFICAR MANUAL</button>
      </div>
    </div>

    <!-- Result Modal -->
    <div id="resultModal" style="display: none; position: fixed; inset: 0; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center;">
      <h2 id="resultTitle" style="font-size: 2rem; font-weight: bold; margin-bottom: 10px;">--</h2>
      <p id="resultMsg" style="font-size: 1.2rem; opacity: 0.9; margin-bottom: 30px;">--</p>
      <div id="ticketInfo" style="background: rgba(0,0,0,0.5); padding: 20px; border-radius: 8px; margin-bottom: 30px; display: none; width: 100%; max-width: 400px; text-align: left;">
        <div style="color: #aaa; font-size: 0.8rem; margin-bottom: 5px;">EVENTO</div>
        <div id="tiEvent" style="margin-bottom: 15px; font-weight: bold;">--</div>
        <div style="color: #aaa; font-size: 0.8rem; margin-bottom: 5px;">NOMBRE</div>
        <div id="tiMember" style="font-weight: bold;">--</div>
      </div>
      <button id="btnNextScan" class="mc-gate-btn" style="width: 100%; max-width: 300px; background: #fff; color: #000;">SIGUIENTE SCAN</button>
    </div>

  </main>

  <script type="module" src="assets/js/scanner.js"></script>
</body>
</html>
