<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carta - Midnight Club</title>
  <meta name="description" content="Midnight Club - Menú y Precios">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="assets/css/tokens.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/base.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/components.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/utils.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/layout.css?v=rebrand7">

  <style>
    /* Structural Noir - Carta specific overrides */
    .carta-item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 1.5rem 0;
    }
    .carta-item-name {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 500;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .carta-item-price {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: #999;
    }
    .sold-out {
      opacity: 0.5;
      text-decoration: line-through;
    }
    
    .cat-content {
      display: none;
      padding-top: 1rem;
    }
    .editorial-nav-link.active .cat-content {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    
    .search-input-wrapper {
      padding: 2rem 1.5rem;
      border-bottom: 1px solid #474747;
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .search-input-wrapper input {
      background: transparent;
      border: none;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      width: 100%;
      outline: none;
      text-transform: uppercase;
    }
    .search-input-wrapper input::placeholder {
      color: #666;
    }
  </style>
</head>

<body class="mc-body pb-0" style="background-color: transparent; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden;">
  <div class="mc-global-media-bg">
    <video autoplay loop muted playsinline poster="assets/images/hero-optimized.jpg">
      <source src="assets/videos/bg.mp4" type="video/mp4">
    </video>
    <div class="mc-global-media-overlay"></div>
  </div>

  <header class="top-app-bar">
    <div class="left">
      <span class="material-symbols-outlined">menu</span>
    </div>
    <div class="logo">MIDNIGHT CLUB</div>
  </header>

  <main class="editorial-main">
    
    <div class="search-input-wrapper">
      <span class="material-symbols-outlined" style="color: #666;">search</span>
      <input type="text" id="searchInput" placeholder="BUSCAR BEBIDA..." autocomplete="off" name="search-drinks" spellcheck="false">
    </div>

    <nav class="editorial-nav" id="dynamicList">
      <!-- Loaded dynamically via carta.js -->
    </nav>
    
    <div id="noResults" style="display: none; padding: 4rem; text-align: center; color: #666; font-family: 'Space Grotesk'; font-size: 2rem; letter-spacing: 0.1em; text-transform: uppercase;">
      NO SE ENCONTRARON RESULTADOS
    </div>

  </main>

  <!-- Modals -->
  <div class="overlay" id="overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:100; align-items:center; justify-content:center;">
    <div class="modal" style="background:#0a0a0a; padding:3rem; border:1px solid #333; width:100%; max-width:500px; text-align:center; font-family:'Space Grotesk';">
      <div class="modal-title" id="modalTitle" style="font-size:2rem; font-weight:700; margin-bottom:1rem; text-transform:uppercase;"></div>
      <div id="modalDesc" style="font-family:'Inter'; color:#888; margin-bottom:2rem;"></div>
      
      <div class="price-box" style="display:flex; justify-content:space-between; border-bottom:1px solid #333; padding-bottom:1rem; margin-bottom:1rem;">
        <span style="color:#666; letter-spacing:0.1em;">EFECTIVO (20% OFF)</span>
        <span class="price-cash" id="modalCash" style="font-size:1.5rem;"></span>
      </div>
      
      <div class="price-box" style="display:flex; justify-content:space-between; margin-bottom:2rem;">
        <span style="color:#666; letter-spacing:0.1em;">TARJETA / MP</span>
        <span class="price-card" id="modalCard" style="font-size:1.5rem;"></span>
      </div>
      
      <button class="btn btn-primary" id="btnCloseModal" style="width:100%; background:#fff; color:#000; font-weight:bold; padding:1rem; border:none; cursor:pointer;">CERRAR</button>
    </div>
  </div>

  <div id="mc-login-gate-container"></div>
  <script type="module" src="assets/js/carta.js?v=8"></script>
</body>
</html>
