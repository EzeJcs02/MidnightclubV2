# Supabase Configuration for Midnight Club Online
# See: https://supabase.com/docs/guides/cli/config
project_id = "tiaclyamzvcnyqwdcyen"

[api]
enabled = true

[auth]
enabled = true

[functions]
# Edge functions configuration
[functions.auth-member]
verify_jwt = false  # We handle our own JWT for members

[functions.tickets-api]
enabled = true
verify_jwt = false
import_map = "./functions/tickets-api/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/tickets-api/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/tickets-api/*.html" ]

[functions.admin-api]
enabled = true
verify_jwt = false
import_map = "./functions/admin-api/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/admin-api/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/admin-api/*.html" ]
