<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Solicitar ID - Midnight Club Salta Argentina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Solicita tu Membresía para Midnight Club." />
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/tokens.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/base.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/components.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/utils.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/layout.css?v=rebrand8">

  <style>
    /* Structural Noir - Solicitar ID Form */
    .noir-form-group {
      width: 100%;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 3rem 1.5rem 2rem;
      transition: background-color 0.3s;
    }
    .noir-form-group:focus-within {
      background-color: rgba(255,255,255,0.02);
    }
    .noir-label {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      margin-bottom: 1.5rem;
      color: rgba(255,255,255,0.4);
    }
    .noir-input {
      width: 100%;
      background: transparent;
      border: none;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(2.5rem, 8vw, 6rem);
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      outline: none;
      caret-color: #fff;
    }
    .noir-input::placeholder {
      color: rgba(255,255,255,0.08);
    }
    .noir-btn {
      width: 100%;
      padding: 3.5rem 1.5rem;
      background: #fff;
      border: none;
      color: #000;
      text-align: left;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900;
      font-size: clamp(2.5rem, 8vw, 6rem);
      text-transform: uppercase;
      letter-spacing: -0.04em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .noir-btn:hover { background: #e5e5e5; }
    .noir-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .checkbox-group-noir {
      padding: 2rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .checkbox-group-noir input[type=checkbox] {
      width: 24px;
      height: 24px;
      accent-color: #fff;
      flex-shrink: 0;
    }
    .checkbox-group-noir label {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      line-height: 1.5;
    }
    .error-text, .success-text {
      padding: 1.5rem 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      display: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .error-text { color: #ff3333; }
    .success-text { color: #33ff99; }
    .form-page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3rem, 10vw, 7.5rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.05em;
      line-height: 1;
      color: #fff;
      padding: 4rem 1.5rem 2rem;
      border-bottom: 1px solid #474747;
    }
    .form-page-meta {
      font-family: 'Inter', sans-serif;
      font-size: 0.625rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      padding: 1.5rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body class="mc-body pb-0" style="background-color: transparent; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden;">
  <div class="mc-global-media-bg">
    <video autoplay loop muted playsinline poster="assets/images/hero-optimized.jpg">
      <source src="assets/videos/bg.mp4" type="video/mp4">
    </video>
    <div class="mc-global-media-overlay"></div>
  </div>

  <header class="top-app-bar">
    <div class="left">
      <span class="material-symbols-outlined" role="button" tabindex="0" aria-label="Abrir menú">menu</span>
    </div>
    <div class="logo">MIDNIGHT CLUB</div>
  </header>

  <main class="editorial-main" style="padding-top: 60px;">

    <div class="form-page-title">SOLICITAR ID</div>
    <div class="form-page-meta">03 // REGISTER — COMPLETA TUS DATOS PARA APLICAR</div>

    <form id="memberForm" style="width: 100%;">
      
      <div class="noir-form-group">
        <label class="noir-label" for="nombre">01 // NOMBRE COMPLETO</label>
        <input type="text" id="nombre" class="noir-input" placeholder="NOMBRE Y APELLIDO" required autocapitalize="words" />
      </div>

      <div class="noir-form-group">
        <label class="noir-label" for="nacimiento">02 // FECHA DE NACIMIENTO (DD/MM/AAAA)</label>
        <input type="tel" id="nacimiento" class="noir-input" placeholder="01/01/2000" maxlength="10" required />
      </div>

      <div class="noir-form-group">
        <label class="noir-label" for="instagram">03 // INSTAGRAM</label>
        <input type="text" id="instagram" class="noir-input" placeholder="@USUARIO" required />
      </div>

      <div class="noir-form-group">
        <label class="noir-label" for="telefono">04 // WHATSAPP</label>
        <input type="tel" id="telefono" class="noir-input" placeholder="387 123 4567" required />
      </div>

      <div class="noir-form-group">
        <label class="noir-label" for="email">05 // CORREO ELECTRÓNICO</label>
        <input type="email" id="email" class="noir-input" placeholder="EMAIL@EJEMPLO.COM" required />
      </div>

      <div class="checkbox-group-noir">
        <input type="checkbox" id="legalCheck" required>
        <label for="legalCheck">Declaro ser mayor de 18 años y acepto los términos y condiciones</label>
      </div>

      <div id="errorMsg" class="error-text"></div>
      <div id="successMsg" class="success-text">SOLICITUD ENVIADA CORRECTAMENTE</div>

      <button type="submit" id="btnSubmit" class="noir-btn">ENVIAR SOLICITUD</button>

    </form>
  </main>

  <div id="mc-login-gate-container"></div>
  <script type="module" src="assets/js/members.js?v=8"></script>
</body>
</html>
