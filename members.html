<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Solicitar ID - Midnight Club Salta Argentina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="description" content="Solicita tu Membresía para Midnight Club." />
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/tokens.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/base.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/components.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/utils.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/layout.css?v=rebrand3">

  <style>
    /* Structural Noir - Form Overrides */
    .noir-form-group {
      width: 100%;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 3rem 1.5rem;
      transition: background-color 0.3s;
    }
    .noir-form-group:focus-within {
      background-color: rgba(255,255,255,0.02);
    }
    .noir-label {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 0.5rem;
      opacity: 0.5;
    }
    .noir-input {
      width: 100%;
      background: transparent;
      border: none;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(3rem, 10vw, 7.5rem);
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -0.05em;
      outline: none;
    }
    .noir-input::placeholder {
      color: rgba(255,255,255,0.1);
    }
    .noir-btn {
      width: 100%;
      padding: 4rem 1.5rem;
      background: transparent;
      border: none;
      border-bottom: 1px solid #474747;
      color: #fff;
      text-align: left;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(3rem, 10vw, 7.5rem);
      text-transform: uppercase;
      letter-spacing: -0.05em;
      cursor: pointer;
      transition: background-color 0.3s, color 0.3s;
    }
    .noir-btn:hover {
      background-color: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .noir-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .checkbox-group-noir {
      padding: 2rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .checkbox-group-noir label {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      color: #999;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .error-text, .success-text {
      padding: 2rem 1.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .error-text { color: #ff3333; }
    .success-text { color: #33ff33; }
  </style>
</head>

<body class="mc-body pb-0" style="background-color: transparent; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden;">
  <div class="mc-global-media-bg">
    <video autoplay loop muted playsinline poster="assets/images/hero-optimized.jpg">
      <source src="assets/videos/bg.mp4" type="video/mp4">
    </video>
    <div class="mc-global-media-overlay"></div>
  </div>

  <header class="top-app-bar">
    <div class="left">
      <span class="material-symbols-outlined">menu</span>
    </div>
    <div class="logo">MIDNIGHT CLUB</div>
  </header>

  <main class="editorial-main" style="padding-top: 60px;">
    <form id="memberForm" style="width: 100%;">
      
      <div class="noir-form-group">
        <label class="noir-label">01 // NOMBRE COMPLETO</label>
        <input type="text" id="nombre" class="noir-input" placeholder="NOMBRE Y APELLIDO" required autocapitalize="words" />
      </div>

      <div class="noir-form-group">
        <label class="noir-label">02 // FECHA DE NACIMIENTO (DD/MM/AAAA)</label>
        <input type="tel" id="nacimiento" class="noir-input" placeholder="01/01/2000" maxlength="10" required />
      </div>

      <div class="noir-form-group">
        <label class="noir-label">03 // INSTAGRAM</label>
        <input type="text" id="instagram" class="noir-input" placeholder="@USUARIO" required />
      </div>

      <div class="noir-form-group">
        <label class="noir-label">04 // WHATSAPP</label>
        <input type="tel" id="telefono" class="noir-input" placeholder="EJ: 387 123 4567" required />
      </div>

      <div class="noir-form-group">
        <label class="noir-label">05 // CORREO ELECTRÓNICO</label>
        <input type="email" id="email" class="noir-input" placeholder="EMAIL@EJEMPLO.COM" required />
      </div>

      <div class="checkbox-group-noir">
        <input type="checkbox" id="legalCheck" required style="width: 20px; height: 20px; accent-color: #fff;">
        <label for="legalCheck">
          DECLARO SER MAYOR DE 18 AÑOS Y ACEPTO LOS TÉRMINOS
        </label>
      </div>

      <div id="errorMsg" class="error-text"></div>
      <div id="successMsg" class="success-text">SOLICITUD ENVIADA CORRECTAMENTE</div>

      <button type="submit" id="btnSubmit" class="noir-btn">
        [ ENVIAR SOLICITUD ]
      </button>

    </form>
  </main>

  <div id="mc-login-gate-container"></div>
  <script type="module" src="assets/js/register.js"></script>
</body>
</html>
