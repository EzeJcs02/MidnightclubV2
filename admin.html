<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Midnight Club - ERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/index.css"> <!-- For the cinematic menu styles -->

  <style>
    /* Cinematic Background */
    .admin-body { 
      background: #000; 
      color: #fff; 
      font-family: 'Inter', sans-serif; 
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    /* Subtle glow background */
    .admin-body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(40,40,40,0.4) 0%, rgba(0,0,0,1) 100%);
      z-index: -1;
      pointer-events: none;
    }

    /* Top Bar */
    .mc-top-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 2rem 3rem;
      z-index: 50;
      mix-blend-mode: difference;
    }
    .mc-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ffffff;
      text-decoration: none;
    }

    /* Cinematic Tabs */
    .admin-nav-container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 100px;
      margin-bottom: 40px;
    }
    .mc-main-nav {
      display: flex;
      gap: 3rem;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .mc-nav-link {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #919191;
      text-decoration: none;
      transition: color 0.4s ease;
      cursor: pointer;
    }
    .mc-nav-link:hover, .mc-nav-link.active {
      color: #ffffff;
    }

    /* Content Area */
    .admin-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 4rem 2rem;
    }
    .tab-pane {
      display: none;
      animation: fadeIn 0.5s ease;
    }
    .tab-pane.active {
      display: block;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Login Screen */
    #loginScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
    }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
    .stat-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); padding: 30px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
    .stat-val { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; font-weight: 300; margin-bottom: 10px; color: #fff; }
    .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }

    /* Tables */
    .table-wrapper { overflow-x: auto; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 15px 20px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
    th { color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; }
    tr:hover { background: rgba(255,255,255,0.05); }
    
    .btn-action { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 6px 12px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
    .btn-action:hover { background: rgba(255,255,255,0.2); }
    .btn-primary { background: #fff; color: #000; font-weight: bold; border-color: #fff; }
    .btn-primary:hover { background: #ccc; }

    /* Modals */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal-content { background: #0a0a0a; padding: 40px; width: 100%; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    .form-control { width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; padding: 10px 0; font-size: 1rem; outline: none; transition: 0.3s; }
    .form-control:focus { border-bottom-color: #fff; }

    /* Badges */
    .badge { padding: 4px 8px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
    .badge.active { color: #4ade80; border: 1px solid #4ade80; }
    .badge.pending { color: #facc15; border: 1px solid #facc15; }
    .badge.rejected { color: #f87171; border: 1px solid #f87171; }
  </style>
</head>
<body class="admin-body">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div style="text-align: center; width: 100%; max-width: 350px;">
      <h1 style="font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.3em; margin-bottom: 40px; font-weight: 300; font-size: 1.5rem;">ERP // LOGIN</h1>
      <input type="password" id="adminPass" class="form-control" placeholder="Contraseña Maestra" style="text-align: center; margin-bottom: 30px; font-size: 1.2rem; letter-spacing: 5px;">
      <button id="btnLogin" class="btn-action btn-primary" style="width: 100%; padding: 15px;">INGRESAR</button>
    </div>
  </div>

  <!-- MAIN ERP -->
  <div id="dashboardScreen" style="display: none;">
    <header class="mc-top-header">
      <div class="mc-logo">ERP // CONTROL</div>
      <a href="#" id="btnLogout" class="mc-logo" style="color: #666;">LOGOUT</a>
    </header>

    <!-- Navigation -->
    <div class="admin-nav-container">
      <ul class="mc-main-nav">
        <li><a class="mc-nav-link active" data-target="tab-dashboard">DASHBOARD</a></li>
        <li><a class="mc-nav-link" data-target="tab-eventos">EVENTOS</a></li>
        <li><a class="mc-nav-link" data-target="tab-members">MEMBERS</a></li>
        <li><a class="mc-nav-link" data-target="tab-carta">CARTA</a></li>
      </ul>
    </div>

    <!-- Content Area -->
    <div class="admin-content">
      
      <!-- TAB: DASHBOARD -->
      <div id="tab-dashboard" class="tab-pane active">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-val" id="statMembers">--</div>
            <div class="stat-label">Members</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" id="statValid">--</div>
            <div class="stat-label">QRs Emitidos</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" id="statUsed">--</div>
            <div class="stat-label">Ingresos Escaneados</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" id="statCarta">--</div>
            <div class="stat-label">Ítems Carta</div>
          </div>
        </div>
      </div>

      <!-- TAB: EVENTOS -->
      <div id="tab-eventos" class="tab-pane">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
          <button id="btnOpenNewEvent" class="btn-action btn-primary">+ NUEVO EVENTO</button>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Evento</th>
                <th>Fecha</th>
                <th>Límite</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="eventsTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- TAB: MEMBERS -->
      <div id="tab-members" class="tab-pane">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Member</th>
                <th>DNI / Registro</th>
                <th>Instagram</th>
                <th>Estado</th>
                <th>Aprobar / Rechazar</th>
              </tr>
            </thead>
            <tbody id="membersTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- TAB: CARTA -->
      <div id="tab-carta" class="tab-pane">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Categoría</th>
                <th>Producto</th>
                <th>Precio</th>
                <th>Stock Visible</th>
                <th>Guardar</th>
              </tr>
            </thead>
            <tbody id="cartaTableBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- MODAL: EVENTO -->
  <div class="modal-overlay" id="eventModal">
    <div class="modal-content">
      <h2 style="font-family: 'Space Grotesk'; font-weight: 300; letter-spacing: 2px; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px;" id="eventModalTitle">EVENTO</h2>
      <input type="hidden" id="evId">
      <div class="form-group">
        <label>Título del Evento</label>
        <input type="text" id="evTitle" class="form-control" placeholder="Ej: MIDNIGHT CLUB 04.07 (+18)">
      </div>
      <div class="form-group">
        <label>Descripción / Bajada</label>
        <input type="text" id="evDesc" class="form-control" placeholder="Válido hasta las 2:00 AM">
      </div>
      <div class="form-group">
        <label>Fecha (Interna)</label>
        <input type="datetime-local" id="evDate" class="form-control" style="color-scheme: dark;">
      </div>
      <div class="form-group">
        <label>Límite Entradas p/Persona</label>
        <input type="number" id="evMax" class="form-control" value="1">
      </div>
      <div style="display: flex; gap: 15px; margin-top: 40px;">
        <button id="btnCancelEvent" class="btn-action" style="flex: 1;">CANCELAR</button>
        <button id="btnSaveEvent" class="btn-action btn-primary" style="flex: 1;">GUARDAR</button>
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/admin.js"></script>
</body>
</html>
