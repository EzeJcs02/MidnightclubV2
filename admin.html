<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin ERP - Midnight Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">

  <style>
    .admin-body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
    .admin-header { display: flex; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid #222; align-items: center; }
    .admin-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: #111; padding: 30px; border-radius: 12px; border: 1px solid #222; text-align: center; }
    .stat-val { font-size: 3rem; font-weight: bold; margin-bottom: 10px; color: #fff; }
    .stat-label { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }

    .section-title { font-size: 1.5rem; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    
    .table-wrapper { overflow-x: auto; background: #111; border-radius: 12px; border: 1px solid #222; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
    th { color: #888; font-weight: 500; font-size: 0.9rem; text-transform: uppercase; }
    tr:hover { background: #1a1a1a; }
    
    .btn-action { background: #333; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .btn-action:hover { background: #555; }
    .btn-primary { background: #fff; color: #000; font-weight: bold; }
    .btn-primary:hover { background: #ccc; }

    /* Forms */
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9rem; }
    .form-control { width: 100%; background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; }
    
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal-content { background: #111; padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #333; }

    /* Login Screen */
    #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    #dashboardScreen { display: none; }
  </style>
</head>
<body class="admin-body">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <h1 style="margin-bottom: 30px; font-weight: 700; letter-spacing: 2px;">MC // ERP LOGIN</h1>
    <div style="background: #111; padding: 40px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 400px; text-align: center;">
      <input type="password" id="adminPass" class="pass-input" placeholder="Contraseña Maestra" style="margin-bottom: 20px; width: 100%;">
      <button id="btnLogin" class="mc-gate-btn" style="width: 100%;">INGRESAR AL PANEL</button>
    </div>
  </div>

  <!-- DASHBOARD SCREEN -->
  <div id="dashboardScreen">
    <header class="admin-header">
      <h1 style="font-size: 1.2rem; letter-spacing: 2px;">MIDNIGHT CLUB <span style="color:#666">ERP</span></h1>
      <div>
        <button id="btnLogout" class="btn-action">Cerrar Sesión</button>
      </div>
    </header>

    <div class="admin-container">
      
      <!-- STATS -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-val" id="statMembers">--</div>
          <div class="stat-label">Members Registrados</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statValid" style="color: #4ade80;">--</div>
          <div class="stat-label">Entradas Emitidas (Válidas)</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statUsed" style="color: #60a5fa;">--</div>
          <div class="stat-label">Entradas Escaneadas (Usadas)</div>
        </div>
      </div>

      <!-- EVENTS MANAGER -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 class="section-title" style="margin: 0; border: none;">Gestión de Eventos</h2>
        <button id="btnOpenNewEvent" class="btn-action btn-primary">+ NUEVO EVENTO</button>
      </div>
      
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Título</th>
              <th>Fecha</th>
              <th>Límite de Tickets</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="eventsTableBody">
            <tr><td colspan="5" style="text-align:center">Cargando eventos...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- NEW EVENT MODAL -->
  <div class="modal-overlay" id="newEventModal">
    <div class="modal-content">
      <h2 style="margin-bottom: 20px;">Crear Nuevo Evento</h2>
      <div class="form-group">
        <label>Título del Evento (Aparecerá en la tarjeta principal)</label>
        <input type="text" id="evTitle" class="form-control" placeholder="Ej: MIDNIGHT CLUB 04.07 (+18) | INGRESO 2:00 AM">
      </div>
      <div class="form-group">
        <label>Descripción / Bajada</label>
        <input type="text" id="evDesc" class="form-control" placeholder="Ej: Sábado 04 de Julio 2026 - Válido hasta las 2:00 AM.">
      </div>
      <div class="form-group">
        <label>Fecha (Interna para ordenamiento)</label>
        <input type="datetime-local" id="evDate" class="form-control">
      </div>
      <div class="form-group">
        <label>Máximo de entradas por persona</label>
        <input type="number" id="evMax" class="form-control" value="5">
      </div>
      <div style="display: flex; gap: 10px; margin-top: 30px;">
        <button id="btnCancelEvent" class="btn-action" style="flex: 1;">Cancelar</button>
        <button id="btnSaveEvent" class="btn-action btn-primary" style="flex: 1;">Guardar Evento</button>
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/admin.js"></script>
</body>
</html>
