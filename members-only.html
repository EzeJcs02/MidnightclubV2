<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Midnight Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/tokens.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/base.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/components.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/utils.css?v=rebrand2">
  <link rel="stylesheet" href="assets/css/layout.css?v=rebrand8">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    .noir-dashboard-header {
      padding: 6rem 1.5rem 3rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      width: 100%;
    }
    .noir-dashboard-welcome {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: #666;
      margin-bottom: 1rem;
    }
    .noir-dashboard-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3rem, 10vw, 7.5rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.05em;
      line-height: 1;
      margin: 0 0 1rem 0;
      color: #fff;
    }
    .noir-dashboard-id {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      color: #999;
      letter-spacing: 0.2em;
    }
    
    .noir-section-title {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: #666;
      padding: 3rem 1.5rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .qr-modal-noir {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      backdrop-filter: blur(10px);
    }
    .qr-modal-noir h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5vw, 4rem);
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 2rem;
      text-align: center;
    }
    .qr-box {
      background: #fff;
      padding: 1.5rem;
      margin-bottom: 3rem;
    }
    .qr-close-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.5);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      padding: 1rem 4rem;
      cursor: pointer;
      text-transform: uppercase;
    }
    .qr-close-btn:hover {
      background: #fff;
      color: #000;
    }
  </style>

</head>

<body class="mc-body pb-0" style="background-color: transparent; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden;">
  <div class="mc-global-media-bg">
    <video autoplay loop muted playsinline poster="assets/images/hero-optimized.jpg">
      <source src="assets/videos/bg.mp4" type="video/mp4">
    </video>
    <div class="mc-global-media-overlay"></div>
  </div>

  <header class="top-app-bar">
    <div class="left">
      <span class="material-symbols-outlined">menu</span>
    </div>
    <div class="logo">MIDNIGHT CLUB</div>
  </header>

  <main class="editorial-main" style="padding-top: 0; padding-bottom: 0;">

    <div class="noir-dashboard-header">
      <div class="noir-dashboard-welcome">ACCESS GRANTED</div>
      <h1 id="memberID" class="noir-dashboard-name">MC-XXXX</h1>
      <div id="memberName" class="noir-dashboard-id" style="text-transform: uppercase;">MEMBER</div>
    </div>

    <div class="noir-section-title">01 // MIS ENTRADAS</div>
    
    <nav class="editorial-nav" id="eventsContainer">
       <div style="padding: 3rem 1.5rem; color: #666;">CARGANDO ACCESOS...</div>
    </nav>

    <div class="noir-section-title" style="margin-top: 2rem;">02 // BENEFICIOS ACTIVOS</div>
    <nav class="editorial-nav">
      <a id="card_mem_0000" href="#" class="editorial-nav-link" style="display:none;">
        <span class="nav-meta">BENEFICIO EXCLUSIVO</span>
        <h2 id="title_mem_0000" class="nav-title-sm">--</h2>
      </a>
      <a id="card_mem_plus" href="#" class="editorial-nav-link" style="display:none;">
        <span class="nav-meta">BENEFICIO EXCLUSIVO</span>
        <h2 id="title_mem_plus" class="nav-title-sm">--</h2>
      </a>
      <a id="card_mem_vip" href="#" class="editorial-nav-link" style="display:none;">
        <span class="nav-meta">BENEFICIO EXCLUSIVO</span>
        <h2 id="title_mem_vip" class="nav-title-sm">--</h2>
      </a>
    </nav>

    <!-- Modal for QR -->
    <div id="qrModal" class="qr-modal-noir">
      <h2 id="qrEventTitle"></h2>
      <div id="qrCodeWrapper" class="qr-box"></div>
      <button id="qrModalClose" class="qr-close-btn">CERRAR</button>
    </div>

  </main>

  <!-- Sidebar & Password Modals (hidden by default) -->
  <!-- ... remaining modals from shared-ui will be injected automatically ... -->

  <script type="module" src="assets/js/members-only.js?v=8"></script>
</body>
</html>
